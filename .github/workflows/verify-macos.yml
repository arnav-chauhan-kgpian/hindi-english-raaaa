name: verify-macos

# Reproduce the scoring conditions on real Apple silicon (macos-14 = M1) so we catch the
# "server not READY / blank offline" failures BEFORE resubmitting — none of us has a local Mac.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "solution/**"
      - "requirements*.txt"
      - ".github/workflows/verify-macos.yml"

jobs:
  verify:
    runs-on: macos-14            # Apple silicon (arm64, M-series)
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Machine info
        run: uname -a; python -c "import platform; print('machine', platform.machine())"

      - name: Install deps (batch + streaming)
        run: pip install -r requirements.txt -r requirements-streaming.txt

      - name: Accelerator check (MPS?)
        run: python -c "import torch; print('torch', torch.__version__, '| mps', torch.backends.mps.is_available())"

      - name: READY interface — sealed server must import draft + draft_reset
        run: |
          python -c "import solution.stream_server as s; assert callable(s.draft) and callable(s.draft_reset); print('OK: stream_server imports draft + draft_reset (server can reach READY)')"

      - name: Wire-protocol contract test (stub draft, no model)
        run: python tests/test_stream_contract.py

      - name: Warm the model cache (network available — downloads the Whisper-Hinglish model)
        run: |
          python - <<'PY'
          import time, solution.transcribe as T
          t = time.time(); ok = T.get_hinglish_model() is not None
          print("hinglish loaded:", ok, "| device", T._HINGLISH_META.get("device"),
                "| %.0fs" % (time.time() - t), "| err", T._LAST_HINGLISH_ERROR or "none")
          assert ok, "model failed to load"
          PY

      - name: Public streaming preview — sealed harness + streaming scorecard (offline)
        run: |
          python - <<'PY'
          import asyncio, solution.transcribe as T
          from evaluator import _evaluate
          print("device:", T._HINGLISH_META.get("device"), "| model:", T.HINGLISH_WHISPER_NAME)
          res = asyncio.run(_evaluate("samples/manifest.json", "solution.stream_server",
                                      runs=1, enforce_offline=True))
          print("\nstreaming score  %.2f/100" % res["overall_score"])
          print("meaning %.3f  churn %.3f  median e2f %s ms  TTFS %s ms  capped %s/%s" % (
              res["meaning_mean"], res["churn_mean"], res["median_end_to_final_ms"],
              res["median_ttfs_ms"], res["clips_capped"], res["n"]))
          for c in res["clips"]:
              cap = ("cap@%s" % c["capped_at"]) if c["capped_at"] else ""
              print("  %-26s score %5s  e2f %s ms  %s %s" % (
                  c["clip_id"][:26], c["score"], c["median_end_to_final_ms"], cap,
                  ";".join(c["reasons"][:2])))
          print("\nNOTE: latency here is CPU/Swift (this VM has no Metal) — NOT the real box.")
          print("Meaning / churn / caps structure are the transferable signal.")
          PY
