name: verify-macos

# Reproduce the scoring conditions on real Apple silicon (macos-14 = M1) so we catch the
# "server not READY / blank offline" failures BEFORE resubmitting — none of us has a local Mac.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "solution/**"
      - "requirements*.txt"
      - ".github/workflows/verify-macos.yml"

jobs:
  verify:
    runs-on: macos-14            # Apple silicon (arm64, M-series)
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Machine info
        run: uname -a; python -c "import platform; print('machine', platform.machine())"

      - name: Install deps (batch + streaming)
        run: pip install -r requirements.txt -r requirements-streaming.txt

      - name: Accelerator check (MPS?)
        run: python -c "import torch; print('torch', torch.__version__, '| mps', torch.backends.mps.is_available())"

      - name: READY interface — sealed server must import draft + draft_reset
        run: |
          python -c "import solution.stream_server as s; assert callable(s.draft) and callable(s.draft_reset); print('OK: stream_server imports draft + draft_reset (server can reach READY)')"

      - name: Wire-protocol contract test (stub draft, no model)
        run: python tests/test_stream_contract.py

      - name: Warm the model cache (network available — downloads the Whisper-Hinglish model)
        run: |
          python - <<'PY'
          import time, solution.transcribe as T
          t = time.time(); ok = T.get_hinglish_model() is not None
          print("hinglish loaded:", ok, "| device", T._HINGLISH_META.get("device"),
                "| %.0fs" % (time.time() - t), "| err", T._LAST_HINGLISH_ERROR or "none")
          assert ok, "model failed to load"
          PY

      - name: Does MPS COMPUTE actually work on this runner?
        run: |
          python - <<'PY'
          import torch, time
          print("mps available:", torch.backends.mps.is_available())
          try:
              a = torch.randn(2048, 2048, device="mps")
              t = time.time()
              for _ in range(20):
                  a = torch.relu(a @ a * 1e-4)
              if hasattr(torch, "mps"): torch.mps.synchronize()
              print("MPS matmul OK — 20x2048^3 in %.3fs (GPU works)" % (time.time() - t))
          except Exception as e:
              print("MPS compute FAILED -> would fall back to CPU:", type(e).__name__, e)
          PY

      - name: Decode latency — Apex on mps/float32 vs mps/float16 vs cpu (find the fast path)
        run: |
          python - <<'PY'
          import time, glob, wave
          import numpy as np, torch
          from transformers import pipeline
          wav = sorted(glob.glob("samples/*hi_en*.wav"))[0]
          with wave.open(wav, "rb") as w: pcm = w.readframes(w.getnframes())
          audio = np.frombuffer(pcm, dtype="<i2").astype(np.float32) / 32768.0
          print("clip %.1fs" % (len(audio)/16000))
          for dev, dt, label in [("mps", torch.float32, "mps/f32 (reference style)"),
                                 ("mps", torch.float16, "mps/f16 (our current)"),
                                 ("cpu", torch.float32, "cpu/f32")]:
              try:
                  p = pipeline("automatic-speech-recognition",
                               model="Oriserve/Whisper-Hindi2Hinglish-Apex",
                               device=dev, torch_dtype=dt, chunk_length_s=30,
                               generate_kwargs={"task": "transcribe", "language": "en"})
                  p(audio)                                   # warm
                  t = time.time(); out = p(audio); ms = (time.time() - t) * 1000
                  print("  %-26s %7.0f ms | %s" % (label, ms, out["text"][:55]))
              except Exception as e:
                  print("  %-26s FAILED: %s: %s" % (label, type(e).__name__, e))
          PY
