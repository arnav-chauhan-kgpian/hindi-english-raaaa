name: verify-macos

# Reproduce the scoring conditions on real Apple silicon (macos-14 = M1) so we catch the
# "server not READY / blank offline" failures BEFORE resubmitting — none of us has a local Mac.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "solution/**"
      - "requirements*.txt"
      - "evaluator.py"
      - "streaming_scorecard.py"
      - "scorecard.py"
      - "preview_stream.py"
      - ".github/workflows/verify-macos.yml"

jobs:
  verify:
    runs-on: macos-14            # Apple silicon (arm64, M-series)
    timeout-minutes: 55
    # This CI VM has NO usable Metal, so force the fast Swift model to bypass the Apex→OOM→CPU
    # fallback and learn whether the streaming engine works end-to-end at all. The real box
    # uses the default (Apex on MPS) — this env only shapes the Metal-less CI.
    env:
      STT_HINGLISH_MODEL: Oriserve/Whisper-Hindi2Hinglish-Swift
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Machine info
        run: uname -a; python -c "import platform; print('machine', platform.machine())"

      - name: Install deps (batch + streaming)
        run: pip install -r requirements.txt -r requirements-streaming.txt

      - name: Accelerator check (MPS?)
        run: python -c "import torch; print('torch', torch.__version__, '| mps', torch.backends.mps.is_available())"

      - name: READY interface — sealed server must import draft + draft_reset
        run: |
          python -c "import solution.stream_server as s; assert callable(s.draft) and callable(s.draft_reset); print('OK: stream_server imports draft + draft_reset (server can reach READY)')"

      - name: Wire-protocol contract test (stub draft, no model)
        run: python tests/test_stream_contract.py

      - name: Warm the model cache (network available — downloads the Whisper-Hinglish model)
        run: |
          python - <<'PY'
          import time, solution.transcribe as T
          t = time.time(); ok = T.get_hinglish_model() is not None
          print("hinglish loaded:", ok, "| device", T._HINGLISH_META.get("device"),
                "| %.0fs" % (time.time() - t), "| err", T._LAST_HINGLISH_ERROR or "none")
          assert ok, "model failed to load"
          PY

      - name: Does the model load in a BACKGROUND thread (as the sealed server does)?
        run: |
          python - <<'PY'
          import threading, time, solution.transcribe as T
          r = {}
          def w():
              try:
                  h = T.get_hinglish_model()
                  r["ok"] = h is not None; r["dev"] = T._HINGLISH_META.get("device")
              except Exception as e:
                  r["err"] = repr(e)
          th = threading.Thread(target=w); t0 = time.time(); th.start(); th.join(300)
          print("alive(after 300s):", th.is_alive(), "| ok:", r.get("ok"),
                "| device:", r.get("dev"), "| %.0fs" % (time.time() - t0),
                "| err:", r.get("err") or T._LAST_HINGLISH_ERROR or "none")
          PY

      - name: Run the server MANUALLY and capture its stderr (see the real subprocess error)
        run: |
          python - <<'PY'
          import asyncio, subprocess, sys, os, time, json, glob, wave
          import websockets
          errf = open("server.err", "w")
          proc = subprocess.Popen([sys.executable, "-u", "-m", "solution.stream_server",
                                   "--host", "127.0.0.1", "--port", "8770"],
                                  stdout=subprocess.PIPE, stderr=errf, text=True)
          # wait for READY on stdout
          ready = False
          t0 = time.time()
          while time.time() - t0 < 120:
              line = proc.stdout.readline()
              if line:
                  print("server stdout:", line.strip())
                  if line.startswith("READY"):
                      ready = True; break
              if proc.poll() is not None:
                  print("server EXITED before READY, code", proc.returncode); break
          print("READY:", ready)

          async def run():
              wav = sorted(glob.glob("samples/*hi_en*.wav"))[0]
              with wave.open(wav, "rb") as w: pcm = w.readframes(w.getnframes())
              async with websockets.connect("ws://127.0.0.1:8770", max_size=None) as ws:
                  await ws.send(json.dumps({"type": "start", "sample_rate": 16000,
                                            "format": "pcm_s16le", "channels": 1, "clip_id": "x"}))
                  fb = 640
                  for i in range(0, len(pcm), fb):
                      await ws.send(pcm[i:i+fb]); await asyncio.sleep(0.004)
                  await ws.send(json.dumps({"type": "end"}))
                  parts = 0
                  while True:
                      m = json.loads(await asyncio.wait_for(ws.recv(), timeout=60))
                      if m["type"] == "partial":
                          parts += 1
                          if parts <= 3 or parts % 10 == 0:
                              print("partial#%d stable=%s | %s" % (parts, m.get("stable_chars"), m.get("text","")[:70]))
                      elif m["type"] == "final":
                          print("FINAL:", repr(m.get("text",""))); print("total partials:", parts); break
          try:
              if ready: asyncio.run(run())
          except Exception as e:
              print("client error:", type(e).__name__, e)
          finally:
              proc.terminate()
              try: proc.wait(timeout=5)
              except Exception: proc.kill()
              errf.close()
          print("\n===== server.err (last 4000 chars) =====")
          print(open("server.err").read()[-4000:])
          PY
